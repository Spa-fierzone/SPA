<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tất cả phản hồi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #ffe6e9, #ffd6e0);
            min-height: 100vh;
        }
        .feedback-card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
        }
        .star {
            color: #ffc107;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4 text-danger fw-bold">✨ Phản hồi từ khách hàng ✨</h2>

    <div th:if="${feedbacks != null and !feedbacks.isEmpty()}">
        <div th:each="fb : ${feedbacks}" class="feedback-card">
            <div class="d-flex justify-content-between">
                <div>
                    <h5 th:text="${fb.user.fullName}">Tên khách hàng</h5>
                    <p class="mb-2" th:text="${fb.content}">Nội dung phản hồi</p>
                    <div class="text-warning">
                        <span class="star" th:each="i : ${#numbers.sequence(1, fb.rating)}">&#9733;</span>
                        <span class="text-muted" th:if="${fb.rating < 5}">
                            <span class="star" th:each="i : ${#numbers.sequence(fb.rating + 1, 5)}" style="color:#ddd;">&#9733;</span>
                        </span>
                    </div>
                    <small class="text-muted" th:text="${#temporals.format(fb.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày</small>
                </div>
                <i class="bi bi-chat-quote fs-1 text-danger opacity-25"></i>
            </div>
        </div>
    </div>

    <p class="text-muted" th:if="${feedbacks == null or feedbacks.isEmpty()}">
        Hiện chưa có đánh giá nào từ khách hàng.
    </p>

    <div class="text-center mt-4">
        <a th:href="@{/}" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left"></i> Quay về trang chủ
        </a>
    </div>
</div>

</body>
</html>
