<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gửi phản hồi</title>

    <!-- Bootstrap + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .feedback-form {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #d63384;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #ff8fab, #ffb3c6);
        }
    </style>
</head>
<body>

<div class="feedback-form">
    <h2>Gửi phản hồi của bạn 💬</h2>

    <form th:action="@{/feedback/submit}" method="post" th:object="${feedback}">
        <div class="mb-3">
            <label for="content" class="form-label">Nội dung</label>
            <textarea id="content" class="form-control" th:field="*{content}" rows="4" required></textarea>
        </div>

        <div class="mb-3">
            <label for="rating" class="form-label">Đánh giá (1–5)</label>
            <input type="number" id="rating" class="form-control" th:field="*{rating}" min="1" max="5" required />
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary px-4">Gửi phản hồi</button>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/}" class="btn btn-outline-secondary">Quay về Dashboard</a>
        </div>

    </form>
</div>

</body>
</html>
